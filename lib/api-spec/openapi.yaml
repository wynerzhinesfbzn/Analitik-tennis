openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tennis Analyst AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: predictions
    description: Tennis match predictions
  - name: openai
    description: OpenAI AI chat, image, and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /predictions:
    get:
      operationId: listPredictions
      tags: [predictions]
      summary: List all predictions
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"
    post:
      operationId: createPrediction
      tags: [predictions]
      summary: Create a new tennis match prediction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionInput"
      responses:
        "201":
          description: Created prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"

  /predictions/{id}:
    get:
      operationId: getPrediction
      tags: [predictions]
      summary: Get a prediction by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePrediction
      tags: [predictions]
      summary: Delete a prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /predictions/{id}/result:
    patch:
      operationId: updatePredictionResult
      tags: [predictions]
      summary: Update the actual result of a prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionResultUpdate"
      responses:
        "200":
          description: Updated prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /predictions/stats:
    get:
      operationId: getPredictionStats
      tags: [predictions]
      summary: Get accuracy stats for predictions
      responses:
        "200":
          description: Prediction statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionStats"

  /predictions/analyze:
    post:
      operationId: analyzeTennisMatch
      tags: [predictions]
      summary: Analyze a tennis match with 3 AI agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisInput"
      responses:
        "200":
          description: SSE stream of agent analysis events
          content:
            text/event-stream: {}

  /predictions/ml-stats:
    get:
      operationId: getPredictionMLStats
      tags: [predictions]
      summary: Get ML stats and Telegram configuration status
      responses:
        "200":
          description: ML stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MLStats"

  /predictions/check-results:
    post:
      operationId: checkPredictionResults
      tags: [predictions]
      summary: Auto-check match results via ESPN/AI and update predictions
      responses:
        "200":
          description: Results checked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckResultsResponse"

  /predictions/{id}/telegram:
    post:
      operationId: publishPredictionToTelegram
      tags: [predictions]
      summary: Publish a prediction to Telegram channel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramPublishResult"
        "503":
          description: Telegram not configured

  /predictions/{id}/telegram-result:
    patch:
      operationId: updateTelegramPredictionResult
      tags: [predictions]
      summary: Update Telegram message with match result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictionResultUpdate"
      responses:
        "200":
          description: Updated

  /predictions/analyze-image:
    post:
      operationId: analyzeBookmakerImage
      tags: [predictions]
      summary: Analyze a bookmaker screenshot and extract odds
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageAnalysisInput"
      responses:
        "200":
          description: Extracted match data from image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageAnalysisResult"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiVoiceMessageInput"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    AgentMessage:
      type: object
      properties:
        agent:
          type: string
          description: "Agent name: stats_expert, odds_strategist, or context_expert"
        agentLabel:
          type: string
          description: Human-readable agent label
        content:
          type: string
          description: Agent's analysis text
      required:
        - agent
        - agentLabel
        - content

    BettingRecommendation:
      type: object
      properties:
        type:
          type: string
          description: "Type: outcome, total, handicap, express"
        description:
          type: string
        odds:
          type: number
        bankPercent:
          type: number
        confidence:
          type: string
          enum: [high, medium, low, disputed]
      required:
        - type
        - description
        - odds
        - bankPercent
        - confidence

    Prediction:
      type: object
      properties:
        id:
          type: integer
        player1:
          type: string
        player2:
          type: string
        tournament:
          type: ["string", "null"]
        surface:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        agentDialogue:
          type: string
          description: JSON array of AgentMessage objects
        recommendations:
          type: string
          description: JSON array of BettingRecommendation objects
        riskNotes:
          type: ["string", "null"]
        cashoutAdvice:
          type: ["string", "null"]
        agentVote:
          type: ["string", "null"]
          description: "Voting result: unanimous or disputed"
        actualResult:
          type: ["string", "null"]
          description: Actual match result entered by user
        isCorrect:
          type: ["boolean", "null"]
          description: Whether the top prediction was correct
        createdAt:
          type: string
          format: date-time
        fatigueScore1:
          type: ["integer", "null"]
          description: Fatigue score 0-10 for player1
        fatigueScore2:
          type: ["integer", "null"]
          description: Fatigue score 0-10 for player2
        mlAdjustment:
          type: ["integer", "null"]
          description: ML-based confidence adjustment in percentage points
        telegramMessageId:
          type: ["string", "null"]
          description: Telegram message ID if published
      required:
        - id
        - player1
        - player2
        - agentDialogue
        - recommendations
        - createdAt

    PredictionInput:
      type: object
      properties:
        player1:
          type: string
        player2:
          type: string
        tournament:
          type: string
        surface:
          type: string
        matchDate:
          type: string
        agentDialogue:
          type: string
        recommendations:
          type: string
        riskNotes:
          type: string
        cashoutAdvice:
          type: string
        agentVote:
          type: string
      required:
        - player1
        - player2
        - agentDialogue
        - recommendations

    PredictionResultUpdate:
      type: object
      properties:
        actualResult:
          type: string
        isCorrect:
          type: boolean
      required:
        - actualResult
        - isCorrect

    PredictionStats:
      type: object
      properties:
        total:
          type: integer
        withResults:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        accuracy:
          type: number
          description: Accuracy percentage 0-100
        recentPredictions:
          type: array
          items:
            $ref: "#/components/schemas/Prediction"
      required:
        - total
        - withResults
        - correct
        - incorrect
        - accuracy
        - recentPredictions

    MLStats:
      type: object
      properties:
        overall:
          type: object
          additionalProperties: true
        bySurface:
          type: object
          additionalProperties: true
        telegramConfigured:
          type: boolean
      required:
        - overall
        - bySurface
        - telegramConfigured

    CheckResultsResponse:
      type: object
      properties:
        checked:
          type: integer
        updated:
          type: integer
        outcomes:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
        - checked
        - updated
        - outcomes

    TelegramPublishResult:
      type: object
      properties:
        messageId:
          type: integer
        published:
          type: boolean
        alreadyPublished:
          type: boolean
      required:
        - messageId

    AnalysisInput:
      type: object
      properties:
        player1:
          type: string
        player2:
          type: string
        tournament:
          type: string
        surface:
          type: string
        matchDate:
          type: string
        odds:
          type: object
          description: Odds data extracted from bookmaker
          additionalProperties: true
        forceRefresh:
          type: boolean
          description: Skip search cache and force fresh web search
      required:
        - player1
        - player2

    ImageAnalysisInput:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64-encoded bookmaker screenshot
      required:
        - imageBase64

    ImageAnalysisResult:
      type: object
      properties:
        player1:
          type: ["string", "null"]
        player2:
          type: ["string", "null"]
        tournament:
          type: ["string", "null"]
        surface:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        odds:
          type: object
          additionalProperties: true
          description: Extracted odds (p1, p2, total, handicap etc.)
        rawText:
          type: string
          description: Raw text extracted from image
      required:
        - rawText

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiVoiceMessageInput:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
